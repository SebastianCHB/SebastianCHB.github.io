<!DOCTYPE html>
<html lang="en">
<head>

    <title>Log In</title>
    <link rel="stylesheet" href="css/Loginstyles.css">
</head>
<body>
    <div class="container">
        <div class="form-section">
            <h1 id="main-text">Hi There!</h1>

            <h3 id="or"> ─────  Or  ───── </h3>
            <input type="text" id="email" placeholder="Your Email">
            <input type="password" id="password" placeholder="Your Password">
            <a href="#" id="forgot-password">Forgot password?</a>
            <button id="login-button">Log In</button>
            <p  >Don't have an account? <a href="signup.html" onclick="changeSignup">Sign Up</a></p>
        </div>
        <div class="image-section"> 
            <div class="image-text">Start planning your next getaway today.</div>
        </div>
    </div>
    <script src="js/LandingPScripts.js"></script>

</html>
